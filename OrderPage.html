      .horizontal.timeline {
	display: flex;
	position: relative;
	flex-direction: row;
	justify-content: space-between;
	align-items: center;
	width: 50%;
  height: 10%;
  margin-left: 550px;


	&:before {
		content: "";
		display: block;
		position: absolute;
		width: 50%;
		height: 0.2em;
		background-color: lighten(#000, 95%);
	}

	.line {
		display: block;
		position: absolute;
		width: 50%;
		height: 0.2em;
		background-color: #D33D3A;
	}

	.steps {
		display: flex;
		position: relative;
		flex-direction: row;
		justify-content: space-between;
		align-items: center;
		width: 80%;

		.step {
			display: block;
			position: relative;
			bottom: calc(100% + 1em);
			padding: 0.33em;
			margin: 0 2em;
			box-sizing: content-box;
			color: #D33D3A;
			background-color: currentColor;
			border: 0.25em solid white;
			border-radius: 50%;
			z-index: 500;

			&:first-child {
				margin-left: 0;
			}

			&:last-child {
				margin-right: 0;
				color: #71cb35;
			}

			span {
				position: absolute;

				top: calc(100% + 1em);
				left: 50%;
				transform: translateX(-50%);
				white-space: nowrap;
				color: #000;
				opacity: 0.4;
			}

			&.current {
				&:before {
					content: "";
					display: block;
					position: absolute;
					top: 50%;
					left: 50%;
					transform: translate(-50%, -50%);

					padding: 1em;
					background-color: currentColor;
					border-radius: 50%;
					opacity: 0;
					z-index: -1;

					animation-name: animation-timeline-current;
					animation-duration: 2s;
					animation-iteration-count: infinite;
					animation-timing-function: ease-out;
				}

				span {
					opacity: 0.8;
				}
			}
		}
	}
}

@keyframes animation-timeline-current {
	from {
		transform: translate(-50%, -50%) scale(0);
		opacity: 1;
	}
	to {
		transform: translate(-50%, -50%) scale(1);
		opacity: 0;
	}
}

<script>
function toggleSubnav() {
    var subnav = document.getElementById("subnav");
    // Toggle the visibility of the subnav
    subnav.classList.toggle("show");
}

// Show content corresponding to the clicked subnav item
function showContent(contentType) {
    // Hide all content sections
    var contentSections = document.querySelectorAll('.content-section');
    contentSections.forEach(function(section) {
        section.classList.remove('show');
    });

    // Show the selected content
    var content = document.getElementById(contentType + '-content');
    content.classList.add('show');
}

const modal = document.querySelector(".modal");
const modalContent = document.querySelector(".modal__content");
const close = document.querySelector(".modal__close");
const modalImg = document.querySelector(".modal__img");
const productList = document.querySelectorAll(".product__list");
const title = document.querySelector(".detail__title");
const cost = document.querySelector(".detail__price");

const productCost = ["£395", "£245", "£195", "£295", "£345", "£455"];

productList.forEach((list, index) => {
  const view = list.querySelector(".product__viewBtn");
  const productImg = list.querySelector(".product__img").getAttribute("src");

  view.addEventListener("click", () => {
    modal.classList.add("modal--bg");
    modalContent.classList.add("modal__content--show");
    modalImg.setAttribute("src", productImg);
    title.innerText = `product title ${index + 1}`;
    cost.innerText = productCost[index];
  });
});

close.addEventListener("click", () => {
  modal.classList.remove("modal--bg");
  modalContent.classList.remove("modal__content--show");
});

modal.addEventListener("click", () => {
  modal.classList.remove("modal--bg");
  modalContent.classList.remove("modal__content--show");
});



</script>

<script>
  // Function to open modal
  function openModal(imageSrc) {
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modal-image');
    modalImage.src = imageSrc; // Set the modal image source
    modal.classList.add('visible'); // Show the modal
  }

  // Function to close modal
  function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.remove('visible'); // Hide the modal
  }

</script>

<script> document.addEventListener("DOMContentLoaded", () => {
  // Select elements
  const cancelButton = document.getElementById("cancelButton");
  const cancelModal = document.getElementById("cancelModal");
  const closeModal = document.getElementById("closeModal");
  const confirmCancel = document.getElementById("confirmCancel");
  const dismissCancel = document.getElementById("dismissCancel");

  // Open modal when Cancel button is clicked
  cancelButton.addEventListener("click", () => {
    cancelModal.classList.add("visible");
  });

  // Close modal when the close button or dismiss button is clicked
  closeModal.addEventListener("click", () => {
    cancelModal.classList.remove("visible");
  });

  dismissCancel.addEventListener("click", () => {
    cancelModal.classList.remove("visible");
  });

  // Confirm Cancel Logic
  confirmCancel.addEventListener("click", () => {
    alert("Your order has been canceled.");
    cancelModal.classList.remove("visible");
  });
});</script>
