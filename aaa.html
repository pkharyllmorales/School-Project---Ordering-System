     <title>Joel's Lemonade</title>
     <style>

         html {
           scroll-behavior: smooth;
         }

         body {
             height: 1500px;
             min-width: auto;
             background: radial-gradient(#FFED40, #e47200);
             overflow-y: hidden; overflow-x: hidden;
         }

         * {
  padding: 0;
  margin: 0;
}
.wrapper {
    background: radial-gradient(#FFED40, #e47200);
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;

  .glass {
    position: relative;
    left: 45%;
    top: 35%;
    width: 150px;
    height: 250px;
    border: 5px solid #fff;
    border-top: none;
    border-radius: 0 0 5px 5px;
    transform: perspective(10px) rotateX(-1deg) scale(0.95);
    z-index: 1000;
    box-shadow: 10px 10px 25px 15px rgba(0,0,0,0.2);
    cursor: pointer;
    &:after {
      content: "";
      width: 150px;
      height: 30px;
      background: transparent;
      position: absolute;
      bottom: 0;
      background: radial-gradient(100% 120% at top, transparent 50%, #fff 51%);
      z-index: 1000;
    }

    .glass:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        
    .liquid {
      background: rgba(200, 211, 215, 0.5);
      position: absolute;
      width: 150px;
      height: 220px;
      bottom: 0;
      overflow: hidden;
      z-index: 10;
    }
    .liquid2 {
      background: rgba(255, 255, 255, 0.25);
      height: 249px;
      border-top: 0.2px solid rgba(255,255,255,0.4);
      width: 150px;
    }
    .straw {
      border: 5px solid #35231a;
      border-bottom: 0;
      border-right: 0;
      height: 200px;
      width: 50px;
      position: absolute;
      left: 83%;
      top: -10%;
      border-radius: 10px 0;
      transform: rotate(15deg);
    }
    .cube {
      width: 60px;
      height: 60px;
      border-radius: 5px;
      position: absolute;
      background: rgba(181, 222, 189, 0.7);
      left: 25%;
      z-index: 100;
    }
    .cube1 {
      bottom: 5%;
      transform: rotate(-5deg);
    }
    .cube2 {
      top: 45%;
      left: 55%;
      transform: rotate(35deg);
      animation: floatIce2 2s infinite alternate;
    }
    .cube3 {
      top: 2%;
      width: 45px;
      height: 40px;
      transform: rotate(5deg);
      animation: floatIce 2s infinite alternate;
    }
    .half-lemon {
      position: absolute;
      width: 100px;
      height: 50px;
      background: #fff;
      border-radius: 100px 100px 0 0;
      border: 5px solid #fdde23;
      border-bottom: 0;
      .seeds {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        border-top: 40px solid #fdde23;
        border-radius: 100%;
      }
      .seed1 {
        left: 8px;
        bottom: -10px;
        transform: rotate(-70deg);
      }
      .seed2 {
        left: 25px;
        bottom: 2px;
        transform: rotate(-20deg);
      }
      .seed3 {
        left: 45px;
        bottom: 2px;
        transform: rotate(15deg);
      }
      .seed4 {
        left: 60px;
        top: 20px;
        transform: rotate(70deg);
      }
    }
    .lemon1 {
      left: 45%;
      bottom: 10%;
      transform: rotate(120deg);
    }
    .lemon2 {
      top: 40%;
      left: -25px;
      transform: rotate(-95deg);
      animation: floatLemon 6s ease-in alternate infinite;
    }
    .bubble {
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.4);
      position: absolute;
      animation-delay: 1s;
    }
    .bubble1 {
      width: 10px;
      height: 10px;
      animation: bubbleAnimation 1s ease-in infinite,
        sideways 0.5s ease-in infinite alternate;
      left: 20%;
    }
    .bubble2 {
      width: 12px;
      height: 12px;
      left: 30%;
      animation: bubbleAnimation 1.5s ease-in infinite,
        sideways 0.3s ease-in infinite alternate;
    }
    .bubble3 {
      width: 8px;
      height: 8px;
      left: 70%;
      animation: bubbleAnimation 3.5s ease-in infinite,
        sideways 0.5s ease-in infinite alternate;
    }

    .bubble4 {
      width: 8px;
      height: 8px;
      left: 90%;
      animation: bubbleAnimation 2.5s ease-in infinite,
        sideways 1s ease-in infinite alternate;
    }
    .leaf {
      width: 40px;
      height: 80px;
      background: #59bda6;
      border-radius: 0 100% 0 100%;
      position: absolute;
      top: 12px;
      left: 6px;
      transform: rotate(190deg);
      overflow: hidden;
      z-index: 10;
      animation: floatLeaf 5s ease-in alternate infinite;
      &:after {
        content: "";
        position: absolute;
        height: 120px;
        width: 60px;
        background-image: linear-gradient(65deg, #064436 50%, #145e49 50%);
      }
    }
  }
  .full-lemon {
    width: 100px;
    height: 100px;
    border-radius: 100%;
    position: absolute;
    border: 6px solid #fdde23;
    top: 35%;
    left: 43%;
    background: #fff;
    z-index: 99px;
    transform: translate(-50%, -50%);
    
    .seed {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid #fdde23;
      border-radius: 100%;
    }
    .seed1 {
      left: 25px;
      top: 5px;
      transform: rotate(-10deg);
    }
    .seed2 {
      left: 5px;
      top: 20px;
      transform: rotate(-75deg);
    }
    .seed3 {
      left: 10px;
      top: 45px;
      transform: rotate(-125deg);
    }
    .seed4 {
      left: 33px;
      top: 55px;
      transform: rotate(-185deg);
    }
    .seed5 {
      left: 52px;
      top: 38px;
      transform: rotate(115deg);
    }
    .seed6 {
      left: 50px;
      top: 12px;
      transform: rotate(50deg);
    }
  }
  a {
    text-decoration: underline;
    color: #fff;
    font-family: sans-serif;
    font-size: 10px;
    margin: 10px;
  }
}
@keyframes bubbleAnimation {
  from {
    bottom: -15%;
  }
  to {
    bottom: 110%;
  }
}
@keyframes sideways {
  from {
    transform: translatex(-20px);
  }
  to {
    transform: translatex(20px);
  }
}
@keyframes floatLemon {
  from {
    transform: translateY(-12px) rotate(-95deg);
  }
  to {
    transform: translateY(12px) rotate(-120deg);
  }
}
@keyframes floatIce {
  from {
    transform: translateY(-5px) rotate(5deg);
  }
  to {
    transform: translateY(2px) rotate(-5deg);
  }
}
@keyframes floatLeaf {
  from {
    transform: translateY(-20px) rotate(-10deg);
  }
  to {
    transform: translateY(-10px) rotate(0);
  }
}

* {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

.waviy {
  position: relative;
  -webkit-box-reflect: below -20px linear-gradient(transparent, rgba(0,0,0,.2));
  margin-left: 650px;
  margin-top: 350px;
}
.waviy span {
  position: relative;
  display: inline-block;
  font-size: 40px;
  color: #fff;
  text-transform: uppercase;
  animation: waviy 1s infinite;
  animation-delay: calc(.1s * var(--i));
}
@keyframes waviy {
  0%,40%,100% {
    transform: translateY(0)
  }
  20% {
    transform: translateY(-20px)
  }
}


        </style>
      </head>

      <div class="wrapper">
        <!-- Wrap the glass div with the link -->
        <a href="LandingPage.html" target="_blank" style="text-decoration: none; color: inherit;">
          <div class="glass">
            <div class="liquid">
              <div class="cube cube1"></div>
              <div class="cube cube2"></div>
              <div class="cube cube3"></div>
              <div class="half-lemon lemon1">
                <div class="seeds seed1"></div>
                <div class="seeds seed2"></div>
                <div class="seeds seed3"></div>
                <div class="seeds seed4"></div>
              </div>
              <div class="half-lemon lemon2">
                <div class="seeds seed1"></div>
                <div class="seeds seed2"></div>
                <div class="seeds seed3"></div>
                <div class="seeds seed4"></div>
              </div>
              <div class="leaf"></div>
              <div class="bubble bubble1"></div>
              <div class="bubble bubble2"></div>
              <div class="bubble bubble3"></div>
              <div class="bubble bubble4"></div>
            </div>
            <div class="straw"></div>
            <div class="liquid liquid2"></div>
          </div>
        </a>
        
        <!-- Other sibling elements (outside the link) -->
        <div class="full-lemon">
          <div class="seed seed1"></div>
          <div class="seed seed2"></div>
          <div class="seed seed3"></div>
          <div class="seed seed4"></div>
          <div class="seed seed5"></div>
          <div class="seed seed6"></div>
        </div>
      

      <body>
        <div class="waviy">
          <span style="--i:1">J</span>
          <span style="--i:2">o</span>
          <span style="--i:3">e</span>
          <span style="--i:4">l</span>
          <span style="--i:5">'</span>
          <span style="--i:6">s</span>
          <span style="--i:7"> </span>
          <span style="--i:8">L</span>
          <span style="--i:9">e</span>
          <span style="--i:10">m</span>
          <span style="--i:11">o</span>
          <span style="--i:12">n</span>
          <span style="--i:13">a</span>
          <span style="--i:14">d</span>
          <span style="--i:15">e</span>
         </div>
       </body>
    </div>

   

    <script>
        // JavaScript to add functionality
        document.getElementById('emptyBtn').addEventListener('click', function() {
            window.location.href = 'LandingPage.html';
        });
    </script>
</body>
